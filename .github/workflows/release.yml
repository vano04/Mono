name: Release artifacts

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
      - name: Verify release version
        run: uv run --no-project python scripts/check_release_version.py --expected "${GITHUB_REF_NAME#v}"
      - name: Build wheel and source distribution
        run: uv build
      - name: Verify public distribution contents
        run: uv run --no-project python scripts/check_distribution_contents.py dist
      - name: Verify distributions
        run: uv run --with twine twine check dist/*
      - uses: actions/upload-artifact@v6
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --generate-notes --verify-tag
