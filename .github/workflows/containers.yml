name: Publish containers

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: Release tag to publish (for example v0.1.5)
        required: true
        default: v0.1.5

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: containers-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.title }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - title: RunTrace runtime
            image: ghcr.io/vano04/runtrace
            context: .
            file: ./Dockerfile.api
            cache: runtime
          - title: RunTrace web
            image: ghcr.io/vano04/runtrace-web
            context: ./apps/web
            file: ./apps/web/Dockerfile
            cache: web
    steps:
      - name: Resolve version
        id: version
        env:
          RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
        run: |
          if ! printf '%s\n' "$RELEASE_REF" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Expected a version tag such as v0.1.5; got: $RELEASE_REF" >&2
            exit 1
          fi
          echo "ref=refs/tags/$RELEASE_REF" >> "$GITHUB_OUTPUT"
          echo "version=${RELEASE_REF#v}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.version.outputs.ref }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
      - name: Verify release version
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: uv run --no-project python scripts/check_release_version.py --expected "$RELEASE_VERSION"
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.source=https://github.com/vano04/RunTrace
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
      - name: Build and publish
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache }}
      - name: Attest image provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
